name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name AFIS-Pack-Installer afis_pack_installer.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AFIS-Pack-Installer-Windows
          path: dist/AFIS-Pack-Installer.exe
